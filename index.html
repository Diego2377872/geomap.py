    <script>
        // ==================== CONFIGURACIÓN SUPABASE ====================
        const _URL = "https://pqwysutcynzagdzozxua.supabase.co";
        const _KEY = "sb_publishable_ZUP6NF7HnkmeiK43jX_DBw_tnp9vcE2";
        const supabaseClient = supabase.createClient(_URL, _KEY);

        let map, draw;
        let currentParcelId = null;
        let parcelasData = [];
        let currentEditingGeometry = null;
        let originalGeometry = null;
        let editingActive = false;
        let snapActive = true;
        let currentGeomType = null;

        // Historial
        let historyStack = [];
        let historyIndex = -1;
        const MAX_HISTORY = 20;

        // Referencias UI
        const editPanel = document.getElementById('editPanel');
        const editPanelHeader = document.getElementById('editPanelHeader');
        const editPanelButtons = document.getElementById('editPanelButtons');
        let isDragging = false;
        let dragOffsetX = 0, dragOffsetY = 0;

        // ==================== HISTORIAL ====================
        function pushHistory() {
            if (!editingActive) return;
            const features = draw.getAll().features;
            if (features.length === 0) return;
            const geom = features[0].geometry;
            const state = JSON.parse(JSON.stringify(geom));
            if (historyIndex < historyStack.length - 1) {
                historyStack = historyStack.slice(0, historyIndex + 1);
            }
            historyStack.push(state);
            if (historyStack.length > MAX_HISTORY) historyStack.shift();
            else historyIndex = historyStack.length - 1;
        }

        function undo() {
            if (!editingActive || historyIndex <= 0) return;
            historyIndex--;
            const prevGeom = historyStack[historyIndex];
            if (prevGeom) {
                draw.deleteAll();
                draw.add({ type: 'Feature', geometry: prevGeom, properties: {} });
                currentEditingGeometry = prevGeom;
                updateMeasureDisplay(currentEditingGeometry);
            }
        }

        function redo() {
            if (!editingActive || historyIndex >= historyStack.length - 1) return;
            historyIndex++;
            const nextGeom = historyStack[historyIndex];
            if (nextGeom) {
                draw.deleteAll();
                draw.add({ type: 'Feature', geometry: nextGeom, properties: {} });
                currentEditingGeometry = nextGeom;
                updateMeasureDisplay(currentEditingGeometry);
            }
        }

        // ==================== FUNCIÓN DE ACTUALIZACIÓN DE MEDIDA ====================
        function updateMeasureDisplay(geometry) {
            if (!geometry) {
                document.getElementById('val-ha').innerHTML = '0.00 <small class="text-xs">Ha</small>';
                document.getElementById('medida-label').innerHTML = 'Superficie';
                document.getElementById('coordDisplay').innerHTML = '--';
                return;
            }
            if (geometry.type === 'Polygon') {
                const areaHa = turf.area(geometry) / 10000;
                document.getElementById('val-ha').innerHTML = `${areaHa.toFixed(2)} <small class="text-xs">Ha</small>`;
                document.getElementById('medida-label').innerHTML = 'Superficie';
            } else if (geometry.type === 'LineString') {
                const lengthKm = turf.length(geometry, { units: 'kilometers' });
                document.getElementById('val-ha').innerHTML = `${lengthKm.toFixed(2)} <small class="text-xs">km</small>`;
                document.getElementById('medida-label').innerHTML = 'Longitud';
            } else if (geometry.type === 'Point') {
                document.getElementById('val-ha').innerHTML = '—';
                document.getElementById('medida-label').innerHTML = 'Punto';
            }
            const centroid = turf.centerOfMass(geometry);
            const [lng, lat] = centroid.geometry.coordinates;
            document.getElementById('coordDisplay').innerHTML = `Lon: ${lng.toFixed(6)}<br>Lat: ${lat.toFixed(6)}`;
        }

        // ==================== MAPA ====================
        map = new maplibregl.Map({
            container: 'map',
            style: {
                version: 8,
                sources: {
                    'satellite': {
                        type: 'raster',
                        tiles: ['https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}'],
                        tileSize: 256,
                        attribution: 'Map data &copy; Google'
                    }
                },
                layers: [{
                    id: 'satellite-layer',
                    type: 'raster',
                    source: 'satellite',
                    minzoom: 0,
                    maxzoom: 22
                }]
            },
            center: [-55.88, -27.26],
            zoom: 13
        });

        draw = new MapboxDraw({
            displayControlsDefault: false,
            controls: {
                point: true,
                line_string: true,
                polygon: true,
                trash: true
            }
        });
        map.addControl(draw);
        map.addControl(new maplibregl.NavigationControl());
        map.addControl(new maplibregl.GeolocateControl({
            positionOptions: { enableHighAccuracy: true },
            trackUserLocation: true
        }));

        // ==================== FUNCIONES PRINCIPALES ====================
        async function fetchParcelas() {
            const { data, error } = await supabaseClient
                .from('parcelas')
                .select('id, nombre, area_ha, geom, foto_url, cultivo, fecha_siembra, estado, observaciones')
                .order('created_at', { ascending: false });
            if (error) console.error('Error fetch:', error);
            if (data) {
                parcelasData = data;
                const geojson = {
                    type: 'FeatureCollection',
                    features: data.map(p => ({
                        id: p.id,
                        type: 'Feature',
                        geometry: p.geom,
                        properties: { ...p, area: p.area_ha }
                    }))
                };
                if (map.getSource('p-src')) map.getSource('p-src').setData(geojson);
                renderList(data);
            }
        }

        function renderList(parcelas) {
            const container = document.getElementById('parcelasList');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filtered = parcelas.filter(p => p.nombre?.toLowerCase().includes(searchTerm));

            if (filtered.length === 0) {
                container.innerHTML = '<div class="text-slate-500 text-center text-sm py-6">No hay parcelas</div>';
                return;
            }

            container.innerHTML = filtered.map(p => {
                let icon = '';
                if (p.geom?.type === 'Point') icon = '📍';
                else if (p.geom?.type === 'LineString') icon = '📏';
                else icon = '🗺️';
                let medida = '';
                if (p.geom?.type === 'Polygon') medida = `${p.area_ha?.toFixed(2) || 0} ha`;
                else if (p.geom?.type === 'LineString') medida = `${p.area_ha?.toFixed(2) || 0} km`;
                else medida = 'Punto';
                return `
                <div class="parcela-list-item rounded-xl p-3 flex items-center gap-3" data-id="${p.id}">
                    <div class="w-12 h-12 rounded-lg bg-cyan-500/20 flex items-center justify-center text-xl">
                        ${icon}
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-white font-bold text-sm truncate">${escapeXml(p.nombre) || 'Sin nombre'}</p>
                        <p class="text-cyan-400 text-xs">${medida}</p>
                        <p class="text-slate-500 text-[10px]">${escapeXml(p.cultivo) || '—'}</p>
                    </div>
                    <button class="text-slate-500 hover:text-cyan-400 transition" onclick="selectParcela('${p.id}')">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 5l7 7-7 7M5 5l7 7-7 7" /></svg>
                    </button>
                </div>
            `}).join('');

            document.querySelectorAll('.parcela-list-item').forEach(el => {
                el.addEventListener('click', (e) => {
                    if (e.target.closest('button')) return;
                    const id = el.getAttribute('data-id');
                    if (id) selectParcela(id);
                });
            });
        }

        async function selectParcela(id) {
            const { data, error } = await supabaseClient
                .from('parcelas')
                .select('*')
                .eq('id', id)
                .single();
            if (error || !data) return;

            const center = turf.centerOfMass(data.geom);
            map.flyTo({ center: center.geometry.coordinates, zoom: 15 });

            showParcelInPanel(data);
            currentParcelId = id;
            currentEditingGeometry = data.geom;
            draw.changeMode('simple_select');
            draw.deleteAll();
            if (editingActive) exitEditMode(false);
            document.getElementById('right-panel').classList.remove('collapsed');
        }

        function showParcelInPanel(parcela) {
            document.getElementById('db-id').value = parcela.id;
            document.getElementById('in-name').value = parcela.nombre || '';
            document.getElementById('in-cultivo').value = parcela.cultivo || 'Soja';
            document.getElementById('in-fecha').value = parcela.fecha_siembra || '';
            document.getElementById('in-estado').value = parcela.estado || 'Activo';
            document.getElementById('in-obs').value = parcela.observaciones || '';

            updateMeasureDisplay(parcela.geom);

            const container = document.getElementById('photo-preview-container');
            if (parcela.foto_url && parcela.foto_url !== "null") {
                const img = document.createElement('img');
                img.className = "h-44 w-full object-cover rounded-2xl border border-white/10 shadow-2xl";
                img.src = parcela.foto_url;
                img.onerror = () => {
                    container.innerHTML = `<div class="h-44 border-2 border-dashed border-red-500/50 rounded-2xl flex items-center justify-center text-red-400 text-[8px] font-bold">Error al cargar imagen</div>`;
                };
                img.onload = () => {
                    container.innerHTML = '';
                    container.appendChild(img);
                };
                container.innerHTML = '';
                container.appendChild(img);
            } else {
                container.innerHTML = `<div class="h-44 border-2 border-dashed border-slate-700 rounded-2xl flex items-center justify-center text-slate-500 text-[8px] font-bold">Sin imagen</div>`;
            }
        }

        function startNewParcela() {
            draw.deleteAll();
            draw.changeMode('draw_polygon');
            document.getElementById('db-id').value = '';
            document.getElementById('in-name').value = '';
            document.getElementById('in-cultivo').value = 'Soja';
            document.getElementById('in-fecha').value = '';
            document.getElementById('in-estado').value = 'Activo';
            document.getElementById('in-obs').value = '';
            document.getElementById('photo-preview-container').innerHTML = `<div class="h-44 border-2 border-dashed border-slate-700 rounded-2xl flex flex-col items-center justify-center text-slate-500 bg-black/40">
                <span class="text-[8px] font-black uppercase">Imagen no disponible</span>
            </div>`;
            document.getElementById('val-ha').innerHTML = '0.00 <small class="text-xs">Ha</small>';
            document.getElementById('medida-label').innerHTML = 'Superficie';
            document.getElementById('in-photo').value = '';
            document.getElementById('coordDisplay').innerHTML = '--';
            currentParcelId = null;
            currentEditingGeometry = null;
            if (editingActive) exitEditMode(false);
            document.getElementById('right-panel').classList.remove('collapsed');
        }

        async function compressImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        const maxSize = 1024;
                        if (width > maxSize || height > maxSize) {
                            if (width > height) {
                                height *= maxSize / width;
                                width = maxSize;
                            } else {
                                width *= maxSize / height;
                                height = maxSize;
                            }
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        canvas.toBlob((blob) => {
                            resolve(new File([blob], file.name, { type: 'image/jpeg', lastModified: Date.now() }));
                        }, 'image/jpeg', 0.7);
                    };
                };
            });
        }

        async function saveChanges() {
            if (!currentParcelId) {
                alert("No hay parcela seleccionada para guardar.");
                return;
            }
            const features = draw.getAll().features;
            if (features.length === 0) {
                alert("No hay geometría para guardar.");
                return;
            }
            const geometry = features[0].geometry;

            let medidaValor = 0;
            if (geometry.type === 'Polygon') {
                medidaValor = turf.area(geometry) / 10000;
            } else if (geometry.type === 'LineString') {
                medidaValor = turf.length(geometry, { units: 'kilometers' });
            }

            const payload = {
                id: currentParcelId,
                nombre: document.getElementById('in-name').value,
                area_ha: medidaValor,
                geom: geometry,
                cultivo: document.getElementById('in-cultivo').value,
                fecha_siembra: document.getElementById('in-fecha').value || null,
                estado: document.getElementById('in-estado').value,
                observaciones: document.getElementById('in-obs').value
            };
            const { error } = await supabaseClient.from('parcelas').upsert([payload]);
            if (error) {
                alert("Error al guardar: " + error.message);
                return;
            }
            currentEditingGeometry = geometry;
            originalGeometry = JSON.parse(JSON.stringify(geometry));
            await fetchParcelas();
            updateMeasureDisplay(geometry);
            alert("Cambios guardados correctamente (sin salir del modo edición).");
        }

        async function sync() {
            const btn = document.getElementById('btn-sync');
            const fileInput = document.getElementById('in-photo');
            const file = fileInput.files[0];
            const id = document.getElementById('db-id').value;
            const nombre = document.getElementById('in-name').value;
            if (!nombre) return alert("El nombre es obligatorio");

            let geometry;
            if (currentParcelId) {
                const features = draw.getAll().features;
                if (features.length > 0) {
                    geometry = features[0].geometry;
                } else {
                    const { data: existing } = await supabaseClient.from('parcelas').select('geom').eq('id', id).single();
                    if (existing) geometry = existing.geom;
                    else return alert("No se encontró la parcela");
                }
            } else {
                const features = draw.getAll().features;
                if (features.length === 0) return alert("Dibuja una geometría en el mapa");
                geometry = features[0].geometry;
            }

            let medidaValor = 0;
            if (geometry.type === 'Polygon') {
                medidaValor = turf.area(geometry) / 10000;
            } else if (geometry.type === 'LineString') {
                medidaValor = turf.length(geometry, { units: 'kilometers' });
            }

            let publicUrl = null;
            if (file) {
                const originalText = btn.innerHTML;
                btn.innerHTML = '<span class="loader"></span> Subiendo...';
                btn.disabled = true;
                const compressed = await compressImage(file);
                const path = `campo_${Date.now()}.jpg`;
                const { error: upErr } = await supabaseClient.storage
                    .from('fotos_parcelas')
                    .upload(path, compressed);
                btn.innerHTML = originalText;
                btn.disabled = false;
                if (upErr) {
                    alert('Error subiendo foto: ' + upErr.message);
                    return;
                }
                publicUrl = supabaseClient.storage
                    .from('fotos_parcelas')
                    .getPublicUrl(path).data.publicUrl;
            }

            const payload = {
                nombre: nombre,
                area_ha: medidaValor,
                geom: geometry,
                cultivo: document.getElementById('in-cultivo').value,
                fecha_siembra: document.getElementById('in-fecha').value || null,
                estado: document.getElementById('in-estado').value,
                observaciones: document.getElementById('in-obs').value
            };
            if (publicUrl) payload.foto_url = publicUrl;
            if (id) payload.id = id;

            btn.disabled = true;
            btn.innerHTML = "Guardando...";
            const { error } = await supabaseClient.from('parcelas').upsert([payload]);
            btn.disabled = false;
            btn.innerHTML = "Guardar parcela";

            if (error) {
                alert("Error: " + error.message);
                console.error(error);
                return;
            }

            await fetchParcelas();
            if (editingActive) exitEditMode(false);
            alert("Parcela guardada correctamente");
        }

        // ==================== EDICIÓN AVANZADA ====================
        function editGeometry() {
            if (!currentParcelId) {
                alert("Selecciona una parcela primero.");
                return;
            }
            draw.deleteAll();
            if (currentEditingGeometry) {
                originalGeometry = JSON.parse(JSON.stringify(currentEditingGeometry));
                draw.add({ type: 'Feature', geometry: currentEditingGeometry, properties: {} });
                draw.changeMode('simple_select');
                editingActive = true;
                currentGeomType = currentEditingGeometry.type;
                historyStack = [JSON.parse(JSON.stringify(currentEditingGeometry))];
                historyIndex = 0;
                showEditPanel(currentGeomType);
                alert("Modo edición activado. Usa las herramientas avanzadas.");
            } else {
                alert("No se pudo cargar la geometría.");
            }
        }

        function exitEditMode(save = false) {
            editingActive = false;
            editPanel.style.display = 'none';
            if (!save && originalGeometry) {
                currentEditingGeometry = originalGeometry;
                draw.deleteAll();
                draw.add({ type: 'Feature', geometry: currentEditingGeometry, properties: {} });
                updateMeasureDisplay(currentEditingGeometry);
            }
            originalGeometry = null;
            historyStack = [];
            historyIndex = -1;
        }

        function showEditPanel(geomType) {
            let buttonsHtml = '';
            if (geomType === 'Point') {
                buttonsHtml += `
                    <button class="edit-tool-btn danger" id="edit-delete-point" title="Eliminar punto"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg> Eliminar</button>
                    <button class="edit-tool-btn" id="edit-move-point" title="Mover punto (arrastrar)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 9l7-7 7 7M5 15l7 7 7-7"/></svg> Mover</button>
                    <button class="edit-tool-btn" id="edit-copy-point" title="Duplicar punto"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg> Duplicar</button>
                `;
            } else if (geomType === 'LineString') {
                buttonsHtml += `
                    <button class="edit-tool-btn" id="edit-add-vertex" title="Añadir vértice"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg> Añadir</button>
                    <button class="edit-tool-btn danger" id="edit-delete-vertex" title="Eliminar vértice seleccionado"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg> Eliminar</button>
                    <button class="edit-tool-btn" id="edit-split-line" title="Dividir línea"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg> Dividir</button>
                    <button class="edit-tool-btn" id="edit-extend-line" title="Extender línea"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16l-4-4m0 0l4-4m-4 4h18"/></svg> Extender</button>
                    <button class="edit-tool-btn" id="edit-smooth-line" title="Suavizar línea (curvas)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-2.5 0-4 2-4 4s1.5 4 4 4 4-2 4-4-1.5-4-4-4z"/><path d="M8 4 L16 4 L20 12 L16 20 L8 20 L4 12 L8 4Z"/></svg> Curva</button>
                `;
            } else if (geomType === 'Polygon') {
                buttonsHtml += `
                    <button class="edit-tool-btn" id="edit-add-vertex" title="Añadir vértice"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg> Añadir</button>
                    <button class="edit-tool-btn danger" id="edit-delete-vertex" title="Eliminar vértice seleccionado"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg> Eliminar</button>
                    <button class="edit-tool-btn" id="edit-smooth-polygon" title="Suavizar polígono (curvas)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-2.5 0-4 2-4 4s1.5 4 4 4 4-2 4-4-1.5-4-4-4z"/><path d="M8 4 L16 4 L20 12 L16 20 L8 20 L4 12 L8 4Z"/></svg> Curva</button>
                `;
            }
            buttonsHtml += `
                <button class="edit-tool-btn" id="edit-undo" title="Deshacer"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6"/></svg> Deshacer</button>
                <button class="edit-tool-btn" id="edit-redo" title="Rehacer"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 10h-10a8 8 0 00-8 8v2M21 10l-6 6m6-6l-6-6"/></svg> Rehacer</button>
                <button class="edit-tool-btn" id="edit-save-disk" title="Guardar cambios"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"/></svg> Guardar</button>
                <button class="edit-tool-btn" id="edit-snap-toggle" style="background: ${snapActive ? 'rgba(0,255,255,0.2)' : 'rgba(0,0,0,0.6)'}" title="Snapping"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg> Snap ${snapActive ? 'ON' : 'OFF'}</button>
                <button class="edit-tool-btn" id="edit-cancel" style="background: rgba(239,68,68,0.2); border-color:#f87171;" title="Cancelar edición"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg> Cancelar</button>
            `;
            editPanelButtons.innerHTML = buttonsHtml;
            editPanel.style.display = 'block';

            document.getElementById('edit-add-vertex')?.addEventListener('click', () => addVertexAtClick());
            document.getElementById('edit-delete-vertex')?.addEventListener('click', () => deleteSelectedVertex());
            document.getElementById('edit-split-line')?.addEventListener('click', () => splitLineAtClick());
            document.getElementById('edit-extend-line')?.addEventListener('click', () => extendLine());
            document.getElementById('edit-smooth-line')?.addEventListener('click', () => smoothLine());
            document.getElementById('edit-smooth-polygon')?.addEventListener('click', () => smoothPolygon());
            document.getElementById('edit-delete-point')?.addEventListener('click', () => deletePoint());
            document.getElementById('edit-move-point')?.addEventListener('click', () => alert("Mueve el punto arrastrándolo con el ratón."));
            document.getElementById('edit-copy-point')?.addEventListener('click', () => duplicatePoint());
            document.getElementById('edit-undo')?.addEventListener('click', () => undo());
            document.getElementById('edit-redo')?.addEventListener('click', () => redo());
            document.getElementById('edit-save-disk')?.addEventListener('click', () => saveChanges());
            document.getElementById('edit-snap-toggle')?.addEventListener('click', () => toggleSnapping());
            document.getElementById('edit-cancel')?.addEventListener('click', () => exitEditMode(false));
        }

        // ==================== FUNCIONES DE EDICIÓN ====================
        function deleteSelectedVertex() {
            if (!editingActive) return;
            draw.trash();
            const features = draw.getAll().features;
            if (features.length > 0) {
                currentEditingGeometry = features[0].geometry;
                updateMeasureDisplay(currentEditingGeometry);
                pushHistory();
            } else {
                exitEditMode(false);
                alert("Geometría eliminada por completo.");
            }
        }

        function addVertexAtClick() {
            if (!editingActive) return;
            alert("Haz clic sobre la línea o borde del polígono para añadir vértice.");
            const clickHandler = (e) => {
                const features = draw.getAll().features;
                if (features.length === 0) {
                    map.off('click', clickHandler);
                    return;
                }
                const geom = features[0].geometry;
                let clickPoint = [e.lngLat.lng, e.lngLat.lat];
                if (snapActive) {
                    const snapped = getSnapPoint(clickPoint, geom);
                    if (snapped) clickPoint = snapped;
                }
                let newCoords;
                if (geom.type === 'LineString') {
                    const coords = geom.coordinates;
                    let minDist = Infinity;
                    let insertIdx = -1;
                    for (let i = 0; i < coords.length - 1; i++) {
                        const seg = turf.lineString([coords[i], coords[i+1]]);
                        const dist = turf.pointToLineDistance(turf.point(clickPoint), seg, { units: 'meters' });
                        if (dist < minDist) {
                            minDist = dist;
                            insertIdx = i + 1;
                        }
                    }
                    if (insertIdx !== -1 && minDist < 20) {
                        coords.splice(insertIdx, 0, clickPoint);
                        newCoords = coords;
                    } else {
                        alert("No se pudo determinar un punto cercano.");
                        map.off('click', clickHandler);
                        return;
                    }
                } else if (geom.type === 'Polygon') {
                    const coords = geom.coordinates[0];
                    let minDist = Infinity;
                    let insertIdx = -1;
                    for (let i = 0; i < coords.length - 1; i++) {
                        const seg = turf.lineString([coords[i], coords[i+1]]);
                        const dist = turf.pointToLineDistance(turf.point(clickPoint), seg, { units: 'meters' });
                        if (dist < minDist) {
                            minDist = dist;
                            insertIdx = i + 1;
                        }
                    }
                    if (insertIdx !== -1 && minDist < 20) {
                        coords.splice(insertIdx, 0, clickPoint);
                        newCoords = [coords];
                    } else {
                        alert("No se pudo determinar un punto cercano.");
                        map.off('click', clickHandler);
                        return;
                    }
                } else {
                    alert("Solo se pueden añadir vértices a líneas o polígonos.");
                    map.off('click', clickHandler);
                    return;
                }
                const newGeometry = geom.type === 'LineString' ? turf.lineString(newCoords).geometry : turf.polygon(newCoords).geometry;
                draw.deleteAll();
                draw.add({ type: 'Feature', geometry: newGeometry, properties: {} });
                currentEditingGeometry = newGeometry;
                updateMeasureDisplay(currentEditingGeometry);
                pushHistory();
                map.off('click', clickHandler);
                alert("Vértice añadido.");
            };
            map.on('click', clickHandler);
        }

        function splitLineAtClick() {
            if (!editingActive) return;
            const features = draw.getAll().features;
            if (features.length === 0 || features[0].geometry.type !== 'LineString') {
                alert("Solo se pueden dividir líneas.");
                return;
            }
            alert("Haz clic en la línea donde quieras dividirla.");
            const clickHandler = (e) => {
                const line = features[0].geometry;
                const clickPoint = [e.lngLat.lng, e.lngLat.lat];
                const snapped = turf.nearestPointOnLine(line, turf.point(clickPoint));
                const splitPoint = snapped.geometry.coordinates;
                const split = turf.lineSplit(turf.lineString(line.coordinates), turf.point(splitPoint));
                if (split.features.length === 2) {
                    const newLine = split.features[0].geometry;
                    draw.deleteAll();
                    draw.add({ type: 'Feature', geometry: newLine, properties: {} });
                    currentEditingGeometry = newLine;
                    updateMeasureDisplay(currentEditingGeometry);
                    pushHistory();
                    alert("Línea dividida. La parte resultante es la primera sección.");
                } else {
                    alert("No se pudo dividir la línea.");
                }
                map.off('click', clickHandler);
            };
            map.on('click', clickHandler);
        }

        function extendLine() {
            if (!editingActive) return;
            const features = draw.getAll().features;
            if (features.length === 0 || features[0].geometry.type !== 'LineString') {
                alert("Solo se pueden extender líneas.");
                return;
            }
            const geom = features[0].geometry;
            const originalCoords = geom.coordinates.slice();
            const lastPoint = originalCoords[originalCoords.length - 1];
            const newLine = turf.lineString([lastPoint, lastPoint]);
            draw.deleteAll();
            draw.add(newLine);
            draw.changeMode('draw_line_string');
            const handler = (e) => {
                const newFeature = e.features[0];
                if (newFeature.geometry.type === 'LineString') {
                    const newCoords = newFeature.geometry.coordinates;
                    let combined = originalCoords.slice();
                    const startIdx = (newCoords.length > 0 &&
                        newCoords[0][0] === lastPoint[0] && newCoords[0][1] === lastPoint[1]) ? 1 : 0;
                    for (let i = startIdx; i < newCoords.length; i++) {
                        combined.push(newCoords[i]);
                    }
                    const extendedLine = turf.lineString(combined);
                    draw.deleteAll();
                    draw.add({ type: 'Feature', geometry: extendedLine.geometry, properties: {} });
                    currentEditingGeometry = extendedLine.geometry;
                    updateMeasureDisplay(currentEditingGeometry);
                    pushHistory();
                    alert("Línea extendida.");
                }
                map.off('draw.create', handler);
                draw.changeMode('simple_select');
            };
            map.on('draw.create', handler);
        }

        function smoothLine() {
            if (!editingActive) return;
            const features = draw.getAll().features;
            if (features.length === 0 || features[0].geometry.type !== 'LineString') {
                alert("Solo se pueden suavizar líneas.");
                return;
            }
            const geom = features[0].geometry;
            const coords = geom.coordinates;
            if (coords.length < 3) {
                alert("Se necesitan al menos 3 puntos para suavizar.");
                return;
            }
            let smoothCoords = [];
            for (let i = 0; i < coords.length - 1; i++) {
                const p0 = coords[i];
                const p1 = coords[i+1];
                const q0 = [0.75 * p0[0] + 0.25 * p1[0], 0.75 * p0[1] + 0.25 * p1[1]];
                const q1 = [0.25 * p0[0] + 0.75 * p1[0], 0.25 * p0[1] + 0.75 * p1[1]];
                smoothCoords.push(q0, q1);
            }
            const newGeom = turf.lineString(smoothCoords).geometry;
            draw.deleteAll();
            draw.add({ type: 'Feature', geometry: newGeom, properties: {} });
            currentEditingGeometry = newGeom;
            updateMeasureDisplay(currentEditingGeometry);
            pushHistory();
            alert("Línea suavizada.");
        }

        function smoothPolygon() {
            if (!editingActive) return;
            const features = draw.getAll().features;
            if (features.length === 0 || features[0].geometry.type !== 'Polygon') {
                alert("Solo se pueden suavizar polígonos.");
                return;
            }
            const geom = features[0].geometry;
            const ring = geom.coordinates[0];
            if (ring.length < 4) {
                alert("Se necesitan al menos 4 puntos para suavizar el polígono.");
                return;
            }
            let smoothRing = [];
            for (let i = 0; i < ring.length - 1; i++) {
                const p0 = ring[i];
                const p1 = ring[i+1];
                const q0 = [0.75 * p0[0] + 0.25 * p1[0], 0.75 * p0[1] + 0.25 * p1[1]];
                const q1 = [0.25 * p0[0] + 0.75 * p1[0], 0.25 * p0[1] + 0.75 * p1[1]];
                smoothRing.push(q0, q1);
            }
            smoothRing.push(smoothRing[0]);
            const newGeom = turf.polygon([smoothRing]).geometry;
            draw.deleteAll();
            draw.add({ type: 'Feature', geometry: newGeom, properties: {} });
            currentEditingGeometry = newGeom;
            updateMeasureDisplay(currentEditingGeometry);
            pushHistory();
            alert("Polígono suavizado.");
        }

        function deletePoint() {
            if (!editingActive) return;
            if (confirm("¿Eliminar este punto?")) {
                draw.deleteAll();
                editingActive = false;
                editPanel.style.display = 'none';
                currentEditingGeometry = null;
                updateMeasureDisplay(null);
                alert("Punto eliminado.");
            }
        }

        function duplicatePoint() {
            if (!editingActive) return;
            const features = draw.getAll().features;
            if (features.length === 0 || features[0].geometry.type !== 'Point') {
                alert("Solo se pueden duplicar puntos.");
                return;
            }
            const point = features[0].geometry.coordinates;
            const offset = 0.00005;
            const newPoint = [point[0] + offset, point[1] + offset];
            draw.deleteAll();
            draw.add({ type: 'Feature', geometry: { type: 'Point', coordinates: newPoint }, properties: {} });
            currentEditingGeometry = { type: 'Point', coordinates: newPoint };
            updateMeasureDisplay(currentEditingGeometry);
            pushHistory();
            alert("Punto duplicado.");
        }

        function getSnapPoint(point, geom) {
            let coords = [];
            if (geom.type === 'LineString') coords = geom.coordinates;
            else if (geom.type === 'Polygon') coords = geom.coordinates[0];
            else return null;
            let minDist = Infinity;
            let snapPoint = null;
            for (const c of coords) {
                const dist = turf.distance(turf.point(point), turf.point(c), { units: 'meters' });
                if (dist < minDist && dist < 15) {
                    minDist = dist;
                    snapPoint = c;
                }
            }
            return snapPoint;
        }

        function toggleSnapping() {
            snapActive = !snapActive;
            const btn = document.getElementById('edit-snap-toggle');
            if (btn) {
                btn.style.background = snapActive ? 'rgba(0,255,255,0.2)' : 'rgba(0,0,0,0.6)';
                btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg> Snap ${snapActive ? 'ON' : 'OFF'}`;
            }
        }

        // ==================== ELIMINAR PARCELA ====================
        async function deleteParcela(id = null) {
            const parcelaId = id || document.getElementById('db-id').value;
            if (!parcelaId) return alert("No hay parcela seleccionada");
            if (!confirm("¿Eliminar esta parcela permanentemente?")) return;
            const { error } = await supabaseClient.from('parcelas').delete().eq('id', parcelaId);
            if (error) alert("Error: " + error.message);
            else {
                await fetchParcelas();
                if (!id) {
                    document.getElementById('db-id').value = '';
                    document.getElementById('in-name').value = '';
                    document.getElementById('val-ha').innerHTML = '0.00 <small class="text-xs">Ha</small>';
                    document.getElementById('coordDisplay').innerHTML = '--';
                    document.getElementById('photo-preview-container').innerHTML = `<div class="h-44 border-2 border-dashed border-slate-700 rounded-2xl flex flex-col items-center justify-center text-slate-500 bg-black/40">
                        <span class="text-[8px] font-black uppercase">Imagen no disponible</span>
                    </div>`;
                    currentParcelId = null;
                    currentEditingGeometry = null;
                    if (editingActive) exitEditMode(false);
                }
            }
        }

        function previewLocal(input) {
            const container = document.getElementById('photo-preview-container');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    container.innerHTML = `<img src="${e.target.result}" class="h-44 w-full object-cover rounded-2xl border border-cyan-400/30 shadow-xl">`;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        // ==================== EXPORTACIONES ====================
        function exportToKML() {
            if (parcelasData.length === 0) {
                alert("No hay parcelas para exportar");
                return;
            }

            let kmlString = `<?xml version="1.0" encoding="UTF-8"?>
<kml xmlns="http://www.opengis.net/kml/2.2">
<Document>
    <name>Parcelas AgroMonitor</name>
    <Style id="parcelaStyle">
        <LineStyle><color>ff00ffff</color><width>2</width></LineStyle>
        <PolyStyle><color>7f00ff00</color><fill>1</fill></PolyStyle>
    </Style>
    <Style id="lineStyle">
        <LineStyle><color>ff00ff00</color><width>3</width></LineStyle>
    </Style>
    <Style id="pointStyle">
        <IconStyle><scale>1.2</scale><Icon><href>http://maps.google.com/mapfiles/kml/pushpin/red-pushpin.png</href></Icon></IconStyle>
    </Style>`;

            parcelasData.forEach(p => {
                const geom = p.geom;
                let coordsString = '';
                if (geom.type === 'Polygon') {
                    const ring = geom.coordinates[0];
                    coordsString = ring.map(c => `${c[0]},${c[1]},0`).join(' ');
                    kmlString += `
    <Placemark>
        <name>${escapeXml(p.nombre || 'Sin nombre')}</name>
        <description>${escapeXml(`Cultivo: ${p.cultivo || '—'}\nÁrea: ${p.area_ha?.toFixed(2) || 0} ha\nEstado: ${p.estado || '—'}\nFecha siembra: ${p.fecha_siembra || '—'}\nObservaciones: ${p.observaciones || '—'}`)}</description>
        <styleUrl>#parcelaStyle</styleUrl>
        <Polygon><outerBoundaryIs><LinearRing><coordinates>${coordsString}</coordinates></LinearRing></outerBoundaryIs></Polygon>
    </Placemark>`;
                } else if (geom.type === 'LineString') {
                    coordsString = geom.coordinates.map(c => `${c[0]},${c[1]},0`).join(' ');
                    kmlString += `
    <Placemark>
        <name>${escapeXml(p.nombre || 'Sin nombre')}</name>
        <description>${escapeXml(`Cultivo: ${p.cultivo || '—'}\nLongitud: ${p.area_ha?.toFixed(2) || 0} km\nEstado: ${p.estado || '—'}\nFecha siembra: ${p.fecha_siembra || '—'}\nObservaciones: ${p.observaciones || '—'}`)}</description>
        <styleUrl>#lineStyle</styleUrl>
        <LineString><coordinates>${coordsString}</coordinates></LineString>
    </Placemark>`;
                } else if (geom.type === 'Point') {
                    const [lng, lat] = geom.coordinates;
                    kmlString += `
    <Placemark>
        <name>${escapeXml(p.nombre || 'Sin nombre')}</name>
        <description>${escapeXml(`Cultivo: ${p.cultivo || '—'}\nEstado: ${p.estado || '—'}\nFecha siembra: ${p.fecha_siembra || '—'}\nObservaciones: ${p.observaciones || '—'}`)}</description>
        <styleUrl>#pointStyle</styleUrl>
        <Point><coordinates>${lng},${lat},0</coordinates></Point>
    </Placemark>`;
                }
            });

            kmlString += `</Document></kml>`;
            downloadFile(kmlString, `parcelas_${new Date().toISOString().slice(0,19)}.kml`, 'application/vnd.google-earth.kml+xml');
        }

        function exportToGeoJSON() {
            const features = parcelasData.map(p => ({
                type: "Feature",
                geometry: p.geom,
                properties: {
                    id: p.id,
                    nombre: p.nombre,
                    cultivo: p.cultivo,
                    estado: p.estado,
                    fecha_siembra: p.fecha_siembra,
                    observaciones: p.observaciones,
                    foto_url: p.foto_url,
                    area_ha: p.area_ha
                }
            }));
            const geojson = { type: "FeatureCollection", features };
            downloadFile(JSON.stringify(geojson, null, 2), `parcelas_${new Date().toISOString().slice(0,19)}.geojson`, 'application/geo+json');
        }

        function downloadFile(content, filename, mime) {
            const blob = new Blob([content], { type: mime });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function escapeXml(str) {
            if (!str) return '';
            return str.replace(/[<>&'"]/g, function (c) {
                if (c === '<') return '&lt;';
                if (c === '>') return '&gt;';
                if (c === '&') return '&amp;';
                if (c === '\'') return '&apos;';
                if (c === '"') return '&quot;';
                return c;
            });
        }

        // ==================== HOVER TOOLTIP ====================
        function createTooltip() {
            const div = document.createElement('div');
            div.className = 'map-tooltip';
            div.style.display = 'none';
            document.body.appendChild(div);
            return div;
        }
        const tooltip = createTooltip();

        map.on('mousemove', (e) => {
            if (editingActive) {
                tooltip.style.display = 'none';
                map.getCanvas().style.cursor = 'crosshair';
                return;
            }
            const features = map.queryRenderedFeatures(e.point, {
                layers: ['p-fill', 'p-line', 'p-line-linestring', 'p-point']
            });
            if (features.length > 0) {
                const feature = features[0];
                const props = feature.properties;
                const geomType = feature.geometry.type;
                let medida = '';
                if (geomType === 'Polygon') medida = `${props.area?.toFixed(2) || 0} ha`;
                else if (geomType === 'LineString') medida = `${props.area?.toFixed(2) || 0} km`;
                else medida = 'Punto';
                const html = `
                    <strong>${escapeXml(props.nombre) || 'Sin nombre'}</strong><br>
                    Cultivo: ${escapeXml(props.cultivo) || '—'}<br>
                    ${geomType === 'Polygon' ? 'Superficie: ' + medida : (geomType === 'LineString' ? 'Longitud: ' + medida : 'Tipo: Punto')}<br>
                    Estado: ${escapeXml(props.estado) || '—'}
                `;
                tooltip.innerHTML = html;
                tooltip.style.display = 'block';
                tooltip.style.left = (e.point.x + 15) + 'px';
                tooltip.style.top = (e.point.y - 30) + 'px';
                map.getCanvas().style.cursor = 'pointer';
            } else {
                tooltip.style.display = 'none';
                map.getCanvas().style.cursor = '';
            }
        });

        // ==================== EVENTOS DEL MAPA ====================
        map.on('load', () => {
            map.addSource('p-src', {
                type: 'geojson',
                data: { type: 'FeatureCollection', features: [] }
            });
            map.addLayer({
                id: 'p-fill',
                type: 'fill',
                source: 'p-src',
                filter: ['==', ['geometry-type'], 'Polygon'],
                paint: { 'fill-color': '#0ff', 'fill-opacity': 0.3 }
            });
            map.addLayer({
                id: 'p-line',
                type: 'line',
                source: 'p-src',
                filter: ['==', ['geometry-type'], 'Polygon'],
                paint: { 'line-color': '#0ff', 'line-width': 2 }
            });
            map.addLayer({
                id: 'p-line-linestring',
                type: 'line',
                source: 'p-src',
                filter: ['==', ['geometry-type'], 'LineString'],
                paint: { 'line-color': '#0f0', 'line-width': 3 }
            });
            map.addLayer({
                id: 'p-point',
                type: 'circle',
                source: 'p-src',
                filter: ['==', ['geometry-type'], 'Point'],
                paint: {
                    'circle-radius': 6,
                    'circle-color': '#ffaa00',
                    'circle-stroke-width': 2,
                    'circle-stroke-color': '#ffffff'
                }
            });
            fetchParcelas();
        });

        map.on('draw.create', (e) => {
            if (editingActive) return;
            const geom = e.features[0].geometry;
            updateMeasureDisplay(geom);
            currentParcelId = null;
            currentEditingGeometry = geom;
            document.getElementById('right-panel').classList.remove('collapsed');
            document.getElementById('db-id').value = '';
            document.getElementById('in-name').value = '';
            document.getElementById('in-fecha').value = '';
            document.getElementById('in-obs').value = '';
            document.getElementById('photo-preview-container').innerHTML = `<div class="h-44 border-2 border-dashed border-slate-700 rounded-2xl flex flex-col items-center justify-center text-slate-500 bg-black/40">
                <span class="text-[8px] font-black uppercase">Imagen no disponible</span>
            </div>`;
            document.getElementById('in-photo').value = '';
        });

        map.on('draw.update', (e) => {
            const geom = e.features[0].geometry;
            updateMeasureDisplay(geom);
        });

        // Función para mostrar popup con soporte táctil
        function handleLayerClick(e) {
            if (editingActive) return;
            showPopup(e);
        }

        // Añadimos eventos tanto para ratón como para táctil
        map.on('click', 'p-fill', handleLayerClick);
        map.on('click', 'p-line', handleLayerClick);
        map.on('click', 'p-line-linestring', handleLayerClick);
        map.on('click', 'p-point', handleLayerClick);
        map.on('touchstart', 'p-fill', handleLayerClick);
        map.on('touchstart', 'p-line', handleLayerClick);
        map.on('touchstart', 'p-line-linestring', handleLayerClick);
        map.on('touchstart', 'p-point', handleLayerClick);

        function showPopup(e) {
            const feature = e.features[0];
            const props = feature.properties;
            const coordinates = e.lngLat;
            const geomType = feature.geometry.type;

            let medida = '';
            if (geomType === 'Polygon') {
                medida = `${props.area?.toFixed(2) || 0} ha`;
            } else if (geomType === 'LineString') {
                medida = `${props.area?.toFixed(2) || 0} km`;
            } else {
                medida = 'Punto';
            }

            const html = `
<div class="popup-card">
    <div class="popup-header">
        <h3>${escapeXml(props.nombre) || 'Sin nombre'}</h3>
        <span class="popup-badge">${escapeXml(props.estado) || '—'}</span>
        <button class="close-popup" style="background:none; border:none; color:#9ca3af; cursor:pointer; font-size:14px;">✕</button>
    </div>
    <div class="popup-body">
        <div class="popup-row">
            <span>📐 Tipo</span>
            <strong>${geomType === 'Polygon' ? 'Polígono' : (geomType === 'LineString' ? 'Línea' : 'Punto')}</strong>
        </div>
        <div class="popup-row">
            <span>🌱 Cultivo</span>
            <strong>${escapeXml(props.cultivo) || '—'}</strong>
        </div>
        <div class="popup-row">
            <span>📏 Medida</span>
            <strong>${medida}</strong>
        </div>
        <div class="popup-row">
            <span>📅 Siembra</span>
            <strong>${props.fecha_siembra || '—'}</strong>
        </div>
    </div>
    ${props.foto_url ? `<div class="popup-image"><img src="${props.foto_url}" /></div>` : ''}
    <div class="popup-actions">
        <button onclick="zoomToParcela('${props.id}')">🔍</button>
        <button onclick="editParcela('${props.id}')">✏️</button>
        <button onclick="copyCoords(${coordinates.lng}, ${coordinates.lat})">📋</button>
        <button onclick="deleteParcela('${props.id}')" class="danger">🗑</button>
    </div>
</div>`;

            const popup = new maplibregl.Popup({ closeButton: false, offset: 15 })
                .setLngLat(coordinates)
                .setHTML(html)
                .addTo(map);

            // Agregar evento al botón cerrar
            const closeBtn = document.querySelector('.maplibregl-popup .close-popup');
            if (closeBtn) {
                closeBtn.addEventListener('click', () => popup.remove());
            }
        }

        // ==================== GPS: OBTENER UBICACIÓN PRECISA ====================
        async function getCurrentLocation() {
            if (!navigator.geolocation) {
                alert("Tu navegador no soporta geolocalización.");
                return;
            }
            try {
                const position = await new Promise((resolve, reject) => {
                    navigator.geolocation.getCurrentPosition(resolve, reject, {
                        enableHighAccuracy: true,
                        timeout: 10000,
                        maximumAge: 0
                    });
                });
                const { latitude, longitude } = position.coords;
                // Centrar mapa con animación
                map.flyTo({ center: [longitude, latitude], zoom: 18, duration: 1500 });
                // Limpiar estado actual (nueva parcela)
                startNewParcela();
                // Crear un punto en esa ubicación
                const point = {
                    type: 'Feature',
                    geometry: { type: 'Point', coordinates: [longitude, latitude] },
                    properties: {}
                };
                draw.deleteAll();          // Limpia cualquier dibujo anterior
                draw.add(point);           // Añade el punto
                draw.changeMode('simple_select'); // Selecciona el punto
                // Actualizar la medida y coordenadas
                updateMeasureDisplay(point.geometry);
                currentParcelId = null;
                currentEditingGeometry = point.geometry;
                // Abrir el panel derecho si está cerrado
                document.getElementById('right-panel').classList.remove('collapsed');
                alert(`Ubicación obtenida: ${latitude.toFixed(6)}, ${longitude.toFixed(6)}. Ahora puedes asignar nombre y guardar la parcela.`);
            } catch (error) {
                console.error(error);
                let msg = "No se pudo obtener la ubicación.";
                if (error.code === 1) msg = "Permiso de ubicación denegado.";
                else if (error.code === 2) msg = "Ubicación no disponible.";
                else if (error.code === 3) msg = "Tiempo de espera agotado.";
                alert(msg);
            }
        }

        window.zoomToParcela = async (id) => {
            const { data } = await supabaseClient.from('parcelas').select('geom').eq('id', id).single();
            if (!data) return;
            const center = turf.centerOfMass(data.geom);
            map.flyTo({ center: center.geometry.coordinates, zoom: 16 });
        };
        window.editParcela = (id) => selectParcela(id);
        window.copyCoords = (lng, lat) => {
            const text = `Lon: ${lng.toFixed(6)}, Lat: ${lat.toFixed(6)}`;
            navigator.clipboard.writeText(text);
            alert('Coordenadas copiadas');
        };

        // ==================== UI Y CONTROLES ====================
        function changeMode(mode) {
            draw.changeMode(mode);
            document.querySelectorAll('.draw-btn').forEach(btn => btn.classList.remove('active'));
            if (mode === 'draw_point') document.getElementById('btn-point-bottom').classList.add('active');
            if (mode === 'draw_line_string') document.getElementById('btn-line-bottom').classList.add('active');
            if (mode === 'draw_polygon') document.getElementById('btn-polygon-bottom').classList.add('active');
            document.getElementById('btn-select').classList.remove('tool-active');
            if (mode === 'simple_select') document.getElementById('btn-select').classList.add('tool-active');
        }

        // Toggles de paneles
        document.getElementById('leftPanelToggle').addEventListener('click', () => {
            document.getElementById('left-panel').classList.toggle('collapsed');
        });
        document.getElementById('rightPanelToggle').addEventListener('click', () => {
            document.getElementById('right-panel').classList.toggle('collapsed');
        });

        // Retracción barra inferior
        const toolbar = document.getElementById('drawToolbar');
        const toggleBtn = document.getElementById('toolbarToggle');
        toggleBtn.addEventListener('click', () => {
            toolbar.classList.toggle('collapsed');
        });

        // Listeners
        document.getElementById('searchInput').addEventListener('input', () => fetchParcelas());
        document.getElementById('refreshListBtn').addEventListener('click', () => fetchParcelas());
        document.getElementById('copyCoordsBtn').addEventListener('click', () => {
            const coordsText = document.getElementById('coordDisplay').innerText;
            if (coordsText && coordsText !== '--') {
                navigator.clipboard.writeText(coordsText.replace(/\n/g, ', '));
                alert('Coordenadas copiadas al portapapeles');
            }
        });

        // Panel flotante arrastrable (solo mouse, se puede mejorar pero no es prioritario)
        let startX, startY, startLeft, startTop;
        editPanelHeader.addEventListener('mousedown', (e) => {
            isDragging = true;
            startX = e.clientX;
            startY = e.clientY;
            const rect = editPanel.getBoundingClientRect();
            startLeft = rect.left;
            startTop = rect.top;
            editPanel.style.cursor = 'grabbing';
            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mouseup', onMouseUp);
            e.preventDefault();
        });

        function onMouseMove(e) {
            if (!isDragging) return;
            const dx = e.clientX - startX;
            const dy = e.clientY - startY;
            let newLeft = startLeft + dx;
            let newTop = startTop + dy;
            newLeft = Math.max(10, Math.min(window.innerWidth - editPanel.offsetWidth - 10, newLeft));
            newTop = Math.max(10, Math.min(window.innerHeight - editPanel.offsetHeight - 10, newTop));
            editPanel.style.left = newLeft + 'px';
            editPanel.style.top = newTop + 'px';
            editPanel.style.right = 'auto';
            editPanel.style.bottom = 'auto';
        }

        function onMouseUp() {
            isDragging = false;
            editPanel.style.cursor = '';
            document.removeEventListener('mousemove', onMouseMove);
            document.removeEventListener('mouseup', onMouseUp);
        }

        document.getElementById('closeEditPanel').addEventListener('click', () => {
            if (editingActive) exitEditMode(false);
            else editPanel.style.display = 'none';
        });

        window.changeMode = changeMode;
        window.startNewParcela = startNewParcela;
        window.selectParcela = selectParcela;
        window.sync = sync;
        window.deleteParcela = deleteParcela;
        window.previewLocal = previewLocal;
        window.exportToKML = exportToKML;
        window.exportToGeoJSON = exportToGeoJSON;
        window.editGeometry = editGeometry;
        window.updateMeasureDisplay = updateMeasureDisplay;
        window.getCurrentLocation = getCurrentLocation;
    </script>
</body>
</html>
